name: Atualizar data.json do painel

on:
  schedule:
    # 10:00 UTC = 07:00 no horário de Brasília (sem horário de verão desde 2019)
    - cron: "0 10 * * *"
  workflow_dispatch: {}  # permite rodar manualmente pelo botão "Run workflow" no GitHub

permissions:
  contents: write  # necessário para o Action poder commitar o data.json de volta no repo

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r scripts/requirements.txt

      - name: Rodar extração
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          python scripts/extract_data.py --config scripts/config.json --out data.json

      - name: Commitar data.json se algo mudou
        run: |
          git config user.name "cataratas-dashboard-bot"
          git config user.email "actions@github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "Nada mudou nos dados hoje."
          else
            git commit -m "chore: atualizar data.json ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
